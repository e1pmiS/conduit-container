services:
  backend:
    image: ghcr.io/e1pmis/conduit-backend:latest
    container_name: conduit-backend
    env_file: .env
    ports: ["8000:8000"]
    volumes: ["dbdata:/data"]
    restart: unless-stopped

  frontend:
    image: ghcr.io/e1pmis/conduit-frontend:latest
    container_name: conduit-frontend
    ports: ["8282:80"]
    depends_on: ["backend"]
    volumes: ["frontend_cache:/var/cache/nginx"]
    restart: unless-stopped

volumes:
  dbdata:
  frontend_cache: