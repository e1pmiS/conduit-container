name: deployment
on:
  push:
    branches: [ feature-automation-workflow ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: ${{ secrets.GHCR_USERNAME }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-backend:${{ github.sha }}

      - name: Build + push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 

      - name: Copy compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: ${{ secrets.VM_PORT }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"   
          target: ${{ secrets.VM_DEPLOY_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: ${{ secrets.VM_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            DIR="${{ secrets.VM_DEPLOY_DIR }}"
            cd "$DIR"
            echo "${{ secrets.GHCR_TOKEN }}" 
            docker compose -f docker-compose.yml down --remove-orphans
            docker container prune -f || true
            docker image prune -f || true
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d --remove-orphans
            sleep 30 
            curl -sSf -m 10 http://127.0.0.1:8000/api/tags/ >/dev/null
            curl -sSf -I -m 10 http://127.0.0.1:8282/ >/dev/null
            docker compose -f docker-compose.yml ps