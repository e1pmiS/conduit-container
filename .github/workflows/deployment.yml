name: deployment
on:
  push:
    branches: [ feature-kubernetes ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: ${{ secrets.GHCR_USERNAME }}

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify backend and frontend Dockerfiles
        run: |
          echo "Backend folder:"
          ls -la ./backend
          echo "Frontend folder:"
          ls -la ./frontend

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-backend:${{ github.sha }}

      - name: Build + push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy Kubernetes manifests to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: ${{ secrets.VM_PORT }}
          key: ${{ secrets.SSH_KEY }}
          source: "k8s/*.yaml"
          target: ${{ secrets.VM_DEPLOY_DIR }}

      - name: Deploy to k3s cluster via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: ${{ secrets.VM_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VM_DEPLOY_DIR }}
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            sudo -E kubectl apply -f k8s/
            sudo -E kubectl rollout status deployment/conduit-backend
            sudo -E kubectl rollout status deployment/conduit-frontend
            sudo -E kubectl get pods -o wide
