name: build-and-push
on:
  push:
    branches: [ feature-automation-workflow ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Compute OWNER (lowercase; fallback to repo owner)
        run: |
          OWNER="${{ secrets.GHCR_USERNAME }}"
          if [ -z "$OWNER" ]; then OWNER="${{ github.repository_owner }}"; fi
          echo "OWNER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-backend:${{ github.ref_name }}-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-backend:${{ github.ref_name }}

      - name: Build + push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-frontend:${{ github.ref_name }}-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/conduit-frontend:${{ github.ref_name }}
