name: deploy
on:
  workflow_dispatch:
  push:
    branches: [ feature-automation-workflow ]

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Preflight secrets
        run: |
          test -n "${{ secrets.VM_HOST }}" || { echo "VM_HOST missing"; exit 1; }
          test -n "${{ secrets.VM_USER }}" || { echo "VM_USER missing"; exit 1; }
          test -n "${{ secrets.SSH_KEY }}" || { echo "SSH_KEY missing"; exit 1; }

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: ${{ secrets.VM_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            DIR="${{ secrets.VM_DEPLOY_DIR }}"
            BR="feature-automation-workflow"
            git -C "$DIR" fetch --all --prune
            git -C "$DIR" checkout "$BR"
            git -C "$DIR" reset --hard "origin/$BR"
            git -C "$DIR" submodule sync --recursive
            git -C "$DIR" submodule update --init --recursive
            cd "$DIR"
            docker compose up -d --build --remove-orphans