name: deploy

on:
  push:
    branches: [ feature-automation-workflow ]
    paths:
      - '.github/workflows/deploy.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  OWNER: ${{ secrets.GHCR_USERNAME }}  

jobs:
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image tags
        id: meta
        run: |
          echo "BACK=${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/conduit-backend:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "FRONT=${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/conduit-frontend:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: ${{ secrets.VM_PORT }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            mkdir -p "${{ secrets.VM_DEPLOY_DIR }}"
            cd "${{ secrets.VM_DEPLOY_DIR }}"

            # write backend .env from secret
            cat > .env <<'ENV'
            ${{ secrets.BACKEND_ENV }}
            ENV

            # login to GHCR and deploy
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f