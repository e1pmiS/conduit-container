# .github/workflows/deploy.yml
name: deploy
on:
  workflow_dispatch:
  push:
    branches: [ feature-automation-workflow ]

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (pull, build, wait 60s, curl checks)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: ${{ secrets.VM_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            DIR="${{ secrets.VM_DEPLOY_DIR }}"
            BR="feature-automation-workflow"

            command -v git >/dev/null || { echo "git missing on VM"; exit 1; }
            test -d "$DIR/.git" || { echo "repo missing at $DIR"; exit 1; }

            git -C "$DIR" fetch --all --prune
            git -C "$DIR" checkout "$BR"
            git -C "$DIR" reset --hard "origin/$BR"
            git -C "$DIR" submodule sync --recursive
            git -C "$DIR" submodule update --init --recursive

            cd "$DIR"
            # login to GHCR only if token provided
            if [ -n "${{ secrets.GHCR_TOKEN }}" ] && [ -n "${{ secrets.GHCR_USERNAME }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin || true
              docker compose pull || true
            fi

            docker compose up -d --build --remove-orphans

            # wait 60s for containers to settle
            sleep 60

            # backend check
            if ! curl -sSf -m 10 http://127.0.0.1:8000/api/tags/ >/dev/null; then
              echo "backend curl failed"; docker compose logs --tail=200 backend; exit 1
            fi

            # frontend check
            if ! curl -sSf -I -m 10 http://127.0.0.1:8282/ >/dev/null; then
              echo "frontend curl failed"; docker compose logs --tail=200 frontend; exit 1
            fi

            docker compose down


            echo "deploy OK"
